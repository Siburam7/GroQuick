<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroQuick</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="navbar">
        <div class="logo-combo">
            <div class="groquick-logo"></div>
            <div class="groquick-logo1"></div>
        </div>

        <div class="right-side">
            <div class="call-us">
                <i class="fa-solid fa-headset"></i>
                <h4>Call Us</h4>
            </div>

            <div class="login">
                <i class="fa-solid fa-user"></i>
                <h4>Login</h4>
            </div>
        </div>
    </div>

    <div class="navbar-line2">
        <div class="silector">

            <div class="text-x-combo">
                <i class="fa-solid fa-location-dot"></i>
                <h4>Select your delivery District:</h4>
            </div>

            <select name="shop1" class="district-list">
                <option value="dtr1">Dhenknal</option>
                <option value="dtr2">Anugul</option>
                <option value="dtr3">cuttack</option>
                <option value="dtr4">Jajpur</option>
            </select>
            
        </div>
            
        <i class="fa-solid fa-bars"></i>

    </div>


    <main>
        <div class="main-box1">
            <div class="main-box1-bgimg">
                <div class="text-combo-main">

                    <h2>Smarter Delivary Start here.</h2>

                    <p>Fast grocery and food delivery in minutes — low charges, better savings.</p>

                    <button>Shop now</button>

                </div>
            </div>
        </div>
    </main>

</body>
</html>
